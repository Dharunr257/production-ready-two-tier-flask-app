{% extends "base.html" %}

{% block title %}Edit Employee - Employee Management System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        
        <div class="glass-card p-5">
            <div class="d-flex align-items-center mb-4">
                <a href="{{ url_for('index') }}" class="btn btn-outline-glass btn-sm me-3 px-2 py-1.5" style="border-radius: 50%;">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h3 class="fw-bold mb-0">Edit Employee Profile</h3>
                    <p class="text-muted mb-0" style="font-size: 0.9rem;">Modify details for Employee #{{ employee.id }}</p>
                </div>
            </div>

            <form action="{{ url_for('edit_employee', id=employee.id) }}" method="POST" autocomplete="off">
                <!-- Full Name -->
                <div class="mb-3">
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" required 
                           placeholder="John Doe" value="{{ employee.full_name }}">
                </div>

                <!-- Email Address -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required 
                           placeholder="johndoe@example.com" value="{{ employee.email }}">
                </div>

                <!-- Department & Position -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" class="form-control" id="department" name="department" required 
                               placeholder="Engineering" value="{{ employee.department }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="position" class="form-label">Position</label>
                        <input type="text" class="form-control" id="position" name="position" required 
                               placeholder="Software Engineer" value="{{ employee.position }}">
                    </div>
                </div>

                <!-- Salary -->
                <div class="mb-4">
                    <label for="salary" class="form-label">Annual Salary (USD)</label>
                    <div class="input-group">
                        <span class="input-group-text border-0" style="background: rgba(15, 23, 42, 0.6); color: #94a3b8;">$</span>
                        <input type="number" step="0.01" min="0" class="form-control" id="salary" name="salary" required 
                               placeholder="85000.00" value="{{ employee.salary }}">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex justify-content-end gap-3 mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-outline-glass">Cancel</a>
                    <button type="submit" class="btn btn-gradient-primary">
                        <i class="fa-solid fa-floppy-disk me-1"></i> Update Record
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>
{% endblock %}
