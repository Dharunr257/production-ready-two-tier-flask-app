<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - Employee Management System</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #1e2640 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #6366f1 !important;
        }
        .glass-navbar {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .form-label {
            font-weight: 500;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #6366f1;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
            color: white;
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .btn-gradient-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-gradient-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            color: white;
        }
        .btn-outline-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            transition: all 0.2s ease;
            padding: 10px 24px;
            border-radius: 8px;
        }
        .btn-outline-glass:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Dynamic Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fa-solid fa-users-gear me-2"></i>EmpPortal
            </a>
        </div>
    </nav>

    <!-- Form Section -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                
                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} alert-dismissible fade show glass-card mb-4" role="alert" style="background: rgba(255, 255, 255, 0.05); color: inherit;">
                                <i class="fa-solid fa-circle-exclamation text-danger me-2"></i>
                                {{ message }}
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <div class="glass-card p-5">
                    <div class="d-flex align-items-center mb-4">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-glass btn-sm me-3 px-2 py-1.5" style="border-radius: 50%;">
                            <i class="fa-solid fa-arrow-left"></i>
                        </a>
                        <div>
                            <h3 class="fw-bold mb-0">Add New Employee</h3>
                            <p class="text-muted mb-0" style="font-size: 0.9rem;">Fill in the details to register a new profile</p>
                        </div>
                    </div>

                    <form action="{{ url_for('add_employee') }}" method="POST" autocomplete="off">
                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" required 
                                   placeholder="John Doe" value="{{ form_data.full_name if form_data else '' }}">
                        </div>

                        <!-- Email Address -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required 
                                   placeholder="johndoe@example.com" value="{{ form_data.email if form_data else '' }}">
                        </div>

                        <!-- Department & Position (Side-by-side on larger screens) -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label">Department</label>
                                <input type="text" class="form-control" id="department" name="department" required 
                                       placeholder="Engineering" value="{{ form_data.department if form_data else '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="position" class="form-label">Position</label>
                                <input type="text" class="form-control" id="position" name="position" required 
                                       placeholder="Software Engineer" value="{{ form_data.position if form_data else '' }}">
                            </div>
                        </div>

                        <!-- Salary -->
                        <div class="mb-4">
                            <label for="salary" class="form-label">Annual Salary (USD)</label>
                            <div class="input-group">
                                <span class="input-group-text border-0" style="background: rgba(15, 23, 42, 0.6); color: #94a3b8;">$</span>
                                <input type="number" step="0.01" min="0" class="form-control" id="salary" name="salary" required 
                                       placeholder="85000.00" value="{{ form_data.salary if form_data else '' }}">
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-end gap-3 mt-4">
                            <a href="{{ url_for('index') }}" class="btn btn-outline-glass">Cancel</a>
                            <button type="submit" class="btn btn-gradient-primary">
                                <i class="fa-solid fa-floppy-disk me-1"></i> Save Record
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
